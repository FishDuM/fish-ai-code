spring:
  application:
    name: fish-ai-code
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
#  datasource:
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://localhost:3306/fish_ai_code
#    username:
#    password:
  # redis
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      ttl: 3600
  profiles:
    active: local

server:
  port: 8911
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: hk.ljx.fishaicode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

